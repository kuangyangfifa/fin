{% extends "base.html" %}

{% block title %}登录 - 公司账户日流水管理系统{% endblock %}

{% block content %}
<div class="login-page">
    <div class="glass-card">
        <div class="text-center mb-4">
            <div class="mb-3">
                <i class="bi bi-wallet2" style="font-size: 3.5rem; color: var(--primary-color);"></i>
            </div>
            <h4 class="mb-1 fw-bold">公司账户日流水管理系统</h4>
            <p class="text-muted small">请登录以继续使用</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label for="username" class="form-label fw-medium">用户名</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="请输入用户名" required autofocus>
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label fw-medium">密码</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="请输入密码" required>
                </div>
            </div>

            {% if request.args.get('next') %}
            <input type="hidden" name="next" value="{{ request.args.get('next') }}">
            {% endif %}

            <div class="d-grid">
                <button type="submit" class="btn btn-primary py-2 fw-semibold">
                    <i class="bi bi-box-arrow-in-right"></i> 登录
                </button>
            </div>
        </form>

        <div class="text-center mt-5 text-muted small opacity-75">
            <p>© {{ now.year if now else '2024' }} 财务管理系统</p>
        </div>
    </div>
</div>
{% endblock %}
